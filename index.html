<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
        />
        <meta name="theme-color" content="#0c0d12" media="(prefers-color-scheme: dark)" />
        <meta name="theme-color" content="#f4f5fa" media="(prefers-color-scheme: light)" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="OZGYM" />
        <meta name="application-name" content="OZGYM" />
        <meta name="format-detection" content="telephone=no" />
        <meta
            name="description"
            content="OZGYM – dein Gym Tracker: Trainingslog, Pläne, Fortschritt & Timer"
        />
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
        <!-- iOS home-screen: exact 180×180 PNG (not the old slash icon) -->
        <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
        <link rel="apple-touch-icon" href="/pwa-192x192.png" sizes="192x192" />
        <link rel="manifest" href="/manifest.webmanifest" />
        <title>OZGYM</title>
        <style>
            html, body, #root {
                background: var(--boot-bg, #0c0d12);
                min-height: 100%;
                min-height: 100dvh;
            }
            body {
                margin: 0;
                overscroll-behavior: none;
                -webkit-overflow-scrolling: touch;
                touch-action: manipulation;
            }
            /* Prevent iOS rubber-band flash behind the app chrome */
            html { height: 100%; overflow: hidden; }
            body { height: 100%; overflow: hidden; }
            #root { height: 100%; overflow: hidden; }
        </style>
        <script>
            (function () {
                try {
                    if ("serviceWorker" in navigator) {
                        navigator.serviceWorker.getRegistrations().then(function (regs) {
                            regs.forEach(function (r) { r.unregister(); });
                        });
                    }
                    if (typeof caches !== "undefined") {
                        caches.keys().then(function (keys) {
                            keys.forEach(function (k) { caches.delete(k); });
                        });
                    }
                } catch (e) { /* ignore */ }

                try {
                    var raw =
                        localStorage.getItem("ozgym:state:v1") ||
                        localStorage.getItem("ironlog:state:v3") ||
                        localStorage.getItem("ironlog:state");
                    var theme = raw && JSON.parse(raw).settings && JSON.parse(raw).settings.theme;
                    if (theme === "light") {
                        document.documentElement.style.setProperty("--boot-bg", "#f4f5fa");
                    }
                } catch (e) { /* dark default */ }
            })();
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
