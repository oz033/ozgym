<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
        />
        <meta name="theme-color" content="#0c0d12" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="OZGYM" />
        <meta
            name="description"
            content="OZGYM – dein Gym Tracker: Trainingslog, Pläne, Fortschritt & Timer"
        />
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
        <link rel="apple-touch-icon" href="/pwa-192x192.png" />
        <title>OZGYM</title>
        <style>
            html, body, #root { background: var(--boot-bg, #0c0d12); }
            body { margin: 0; overscroll-behavior: none; }
        </style>
        <script>
            (function () {
                try {
                    if ("serviceWorker" in navigator) {
                        navigator.serviceWorker.getRegistrations().then(function (regs) {
                            regs.forEach(function (r) { r.unregister(); });
                        });
                    }
                    if (typeof caches !== "undefined") {
                        caches.keys().then(function (keys) {
                            keys.forEach(function (k) { caches.delete(k); });
                        });
                    }
                } catch (e) { /* ignore */ }

                try {
                    var raw =
                        localStorage.getItem("ozgym:state:v1") ||
                        localStorage.getItem("ironlog:state:v3") ||
                        localStorage.getItem("ironlog:state");
                    var theme = raw && JSON.parse(raw).settings && JSON.parse(raw).settings.theme;
                    if (theme === "light") {
                        document.documentElement.style.setProperty("--boot-bg", "#f4f5fa");
                    }
                } catch (e) { /* dark default */ }
            })();
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
