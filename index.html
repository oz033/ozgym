<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
        <!-- viewport-fit=cover is required for env(safe-area-inset-*) on every iPhone -->
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
        />
        <meta name="theme-color" content="#0c0d12" media="(prefers-color-scheme: dark)" />
        <meta name="theme-color" content="#e8e8ea" media="(prefers-color-scheme: light)" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="OZGYM" />
        <meta name="application-name" content="OZGYM" />
        <meta name="format-detection" content="telephone=no" />
        <meta
            name="description"
            content="OZGYM – dein Gym Tracker: Trainingslog, Pläne, Fortschritt & Timer"
        />
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
        <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
        <link rel="apple-touch-icon" href="/pwa-192x192.png" sizes="192x192" />
        <link rel="manifest" href="/manifest.webmanifest" />
        <title>OZGYM</title>
        <style>
            /* iOS 10–18 shell: lock root to the real visual viewport (no bottom gap) */
            :root {
                --boot-bg: #0c0d12;
                --app-height: 100dvh;
                --sat: env(safe-area-inset-top, 0px);
                --sar: env(safe-area-inset-right, 0px);
                --sab: env(safe-area-inset-bottom, 0px);
                --sal: env(safe-area-inset-left, 0px);
            }
            @supports (padding: constant(safe-area-inset-bottom)) {
                :root {
                    --sat: constant(safe-area-inset-top);
                    --sar: constant(safe-area-inset-right);
                    --sab: constant(safe-area-inset-bottom);
                    --sal: constant(safe-area-inset-left);
                }
            }
            html {
                height: 100%;
                height: -webkit-fill-available;
                background: var(--boot-bg);
                overflow: hidden;
            }
            body {
                margin: 0;
                padding: 0;
                background: var(--boot-bg);
                overflow: hidden;
                /* fixed body = no rubber-band gap under the app on iOS */
                position: fixed;
                inset: 0;
                width: 100%;
                height: 100%;
                height: var(--app-height, 100dvh);
                overscroll-behavior: none;
            }
            #root {
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: var(--boot-bg);
                /* scrolling happens only inside .ig-main */
                touch-action: pan-y;
            }
        </style>
        <script>
            (function () {
                /*
                 * Stable shell height for iOS PWA.
                 * Do NOT bind --app-height to visualViewport.height: when the
                 * keyboard opens, VV shrinks and the whole UI collapses into
                 * the top strip (note field / steppers jump to the top).
                 * Use layout height only; freeze while an input is focused.
                 */
                var lastH = 0;
                function readingInput() {
                    var ae = document.activeElement;
                    if (!ae) return false;
                    var t = ae.tagName;
                    return (
                        t === "INPUT" ||
                        t === "TEXTAREA" ||
                        t === "SELECT" ||
                        ae.isContentEditable
                    );
                }
                function setAppHeight(force) {
                    try {
                        if (!force && readingInput()) return;
                        var h =
                            window.innerHeight ||
                            document.documentElement.clientHeight ||
                            0;
                        // Ignore tiny shrinks that are still keyboard (some WebViews)
                        if (!force && lastH > 0 && h < lastH * 0.8) return;
                        if (h > 0 && Math.abs(h - lastH) > 1) {
                            lastH = h;
                            document.documentElement.style.setProperty(
                                "--app-height",
                                h + "px",
                            );
                        }
                    } catch (e) { /* ignore */ }
                }
                setAppHeight(true);
                window.addEventListener(
                    "resize",
                    function () {
                        setAppHeight(false);
                    },
                    { passive: true },
                );
                window.addEventListener(
                    "orientationchange",
                    function () {
                        setTimeout(function () {
                            setAppHeight(true);
                        }, 50);
                        setTimeout(function () {
                            setAppHeight(true);
                        }, 350);
                    },
                    { passive: true },
                );
                // Do NOT listen to visualViewport resize/scroll for shell height.

                try {
                    if ("serviceWorker" in navigator) {
                        navigator.serviceWorker.getRegistrations().then(function (regs) {
                            regs.forEach(function (r) { r.unregister(); });
                        });
                    }
                    if (typeof caches !== "undefined") {
                        caches.keys().then(function (keys) {
                            keys.forEach(function (k) { caches.delete(k); });
                        });
                    }
                } catch (e) { /* ignore */ }

                try {
                    var raw =
                        localStorage.getItem("ozgym:state:v1") ||
                        localStorage.getItem("ironlog:state:v3") ||
                        localStorage.getItem("ironlog:state");
                    var theme = raw && JSON.parse(raw).settings && JSON.parse(raw).settings.theme;
                    if (theme === "light") {
                        document.documentElement.style.setProperty("--boot-bg", "#e8e8ea");
                    }
                } catch (e) { /* dark default */ }
            })();
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
